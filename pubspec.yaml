name: taskflow_pro
description: "Advanced Task Management App - More powerful than Todoist"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^14.1.0

  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Date & Time
  intl: ^0.18.1
  timezone: ^0.9.2

  # Calendar
  table_calendar: ^3.0.9
  syncfusion_flutter_calendar: ^24.1.41

  # Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

  # Voice & Speech
  speech_to_text: ^6.6.0
  just_audio: ^0.9.36
  permission_handler: ^11.1.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Icons & Images
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

  # HTTP & API
  dio: ^5.4.0

  # Utils
  uuid: ^4.3.1
  collection: ^1.18.0

  # Charts & Analytics
  fl_chart: ^0.65.0

  # AI/ML (untuk fitur AI)
  google_generative_ai: ^0.2.0

  # Pomodoro Timer
  timer_builder: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/

  # Fonts - comment out sementara (font file belum ada)
